<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS 音乐播放器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 登录页 ===== -->
  <div id="login-page" class="page active">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <span class="logo-icon">🎵</span>
          <h1>NAS 音乐</h1>
          <p>你的私人音乐库</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">用户名</label>
            <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required>
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-block" id="login-btn">
            <span>登 录</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== 主界面 ===== -->
  <div id="app-page" class="page">

    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">🎵</span>
        <h2>NAS 音乐</h2>
        <button id="sidebar-close" class="sidebar-close-btn" title="关闭侧边栏">✕</button>
      </div>

      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="🔍 搜索音乐..." autocomplete="off">
      </div>

      <nav class="sidebar-nav">
        <a href="#home" class="nav-link active" data-route="home">
          <span class="nav-icon">🏠</span>
          <span>全部音乐</span>
        </a>
        <a href="#artists" class="nav-link" data-route="artists">
          <span class="nav-icon">🎤</span>
          <span>艺术家</span>
        </a>
        <a href="#albums" class="nav-link" data-route="albums">
          <span class="nav-icon">💿</span>
          <span>专辑</span>
        </a>
        <a href="#directory" class="nav-link" data-route="directory">
          <span class="nav-icon">📁</span>
          <span>目录浏览</span>
        </a>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span>歌单</span>
          <button id="btn-create-playlist" class="btn-icon" title="新建歌单">＋</button>
        </div>
        <ul id="playlist-list" class="playlist-list">
          <!-- 动态生成 -->
        </ul>
      </div>

      <div class="sidebar-footer">
        <button id="btn-scan" class="btn btn-sm btn-outline" title="扫描音乐库">
          🔄 扫描音乐库
        </button>
        <button id="btn-theme-toggle" class="btn-icon" title="切换主题">
          🌙
        </button>
        <div class="user-menu">
          <button id="btn-user-menu" class="btn-icon" title="用户菜单">
            👤 <span id="current-username">用户</span>
          </button>
          <div id="user-dropdown" class="dropdown hidden">
            <a href="#" id="btn-admin-users" class="dropdown-item">👥 管理用户</a>
            <a href="#" id="btn-logout" class="dropdown-item">🚪 退出登录</a>
          </div>
        </div>
      </div>
    </aside>

    <!-- 移动端导航按钮 -->
    <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>

    <!-- 主内容区 -->
    <main id="main-content" class="main-content">
      <div id="view-container" class="view-container">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </main>

    <!-- 歌词面板 -->
    <aside id="lyrics-panel" class="lyrics-panel hidden">
      <div class="lyrics-header">
        <h3>歌词</h3>
        <button id="btn-close-lyrics" class="btn-icon">✕</button>
      </div>
      <div id="lyrics-content" class="lyrics-content">
        <p class="lyrics-placeholder">暂无歌词</p>
      </div>
    </aside>

    <!-- 底部播放栏 -->
    <footer id="player-bar" class="player-bar">
      <div class="player-track-info">
        <div class="player-art" id="player-art">
          <span>🎵</span>
        </div>
        <div class="player-meta">
          <div class="player-song-title" id="player-song-title">未选择歌曲</div>
          <div class="player-song-artist" id="player-song-artist">—</div>
        </div>
        <button id="btn-toggle-fav" class="btn-icon btn-fav" title="收藏">♡</button>
      </div>

      <div class="player-controls-center">
        <div class="player-buttons">
          <button id="btn-shuffle" class="btn-icon btn-sm" title="随机播放">🔀</button>
          <button id="btn-prev" class="btn-icon" title="上一首">⏮</button>
          <button id="btn-play" class="btn-play" title="播放">▶</button>
          <button id="btn-next" class="btn-icon" title="下一首">⏭</button>
          <button id="btn-repeat" class="btn-icon btn-sm" title="循环播放">🔁</button>
        </div>
        <div class="player-progress">
          <span id="time-current" class="time-display">0:00</span>
          <div class="progress-bar-container" id="progress-bar">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="progress-fill"></div>
              <div class="progress-bar-handle" id="progress-handle"></div>
            </div>
          </div>
          <span id="time-total" class="time-display">0:00</span>
        </div>
      </div>

      <div class="player-controls-right">
        <button id="btn-lyrics-toggle" class="btn-icon btn-sm" title="歌词">📝</button>
        <button id="btn-speed" class="btn-icon btn-sm speed-btn" title="播放速度">1.0x</button>
        <div id="speed-menu" class="dropdown speed-dropdown hidden">
          <button data-speed="0.5" class="dropdown-item">0.5x</button>
          <button data-speed="0.75" class="dropdown-item">0.75x</button>
          <button data-speed="1" class="dropdown-item active">1.0x</button>
          <button data-speed="1.25" class="dropdown-item">1.25x</button>
          <button data-speed="1.5" class="dropdown-item">1.5x</button>
          <button data-speed="2" class="dropdown-item">2.0x</button>
        </div>
        <div class="volume-control">
          <button id="btn-volume" class="btn-icon btn-sm" title="音量">🔊</button>
          <div class="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="100" value="80" class="volume-slider">
          </div>
        </div>
        <button id="btn-download" class="btn-icon btn-sm" title="下载">⬇️</button>
        <button id="btn-queue-toggle" class="btn-icon btn-sm" title="播放队列">📋</button>
      </div>
    </footer>
  </div>

  <!-- ===== 弹窗 ===== -->

  <!-- 新建歌单弹窗 -->
  <div id="modal-create-playlist" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>新建歌单</h3>
        <button class="btn-icon modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="playlist-name-input">歌单名称</label>
          <input type="text" id="playlist-name-input" placeholder="我的歌单" maxlength="50">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">取消</button>
        <button class="btn btn-primary" id="btn-confirm-create-playlist">创建</button>
      </div>
    </div>
  </div>

  <!-- 添加到歌单弹窗 -->
  <div id="modal-add-to-playlist" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>添加到歌单</h3>
        <button class="btn-icon modal-close">✕</button>
      </div>
      <div class="modal-body">
        <ul id="modal-playlist-list" class="modal-playlist-list">
          <!-- 动态生成 -->
        </ul>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">取消</button>
      </div>
    </div>
  </div>

  <!-- 管理用户弹窗 -->
  <div id="modal-admin-users" class="modal-overlay hidden">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>👥 管理用户</h3>
        <button class="btn-icon modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <input type="text" id="new-user-username" placeholder="用户名" maxlength="30">
          </div>
          <div class="form-group">
            <input type="password" id="new-user-password" placeholder="密码" maxlength="100">
          </div>
          <div class="form-group">
            <select id="new-user-role">
              <option value="user">普通用户</option>
              <option value="admin">管理员</option>
            </select>
          </div>
          <button class="btn btn-primary" id="btn-add-user">添加</button>
        </div>
        <div id="admin-user-list" class="admin-user-list">
          <!-- 动态生成 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">关闭</button>
      </div>
    </div>
  </div>

  <!-- 下载弹窗 -->
  <div id="modal-download" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>下载</h3>
        <button class="btn-icon modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="download-info">
          <p id="download-filename">—</p>
          <div class="progress-bar-container">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="download-progress-fill"></div>
            </div>
          </div>
          <p id="download-status">准备下载...</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">关闭</button>
      </div>
    </div>
  </div>

  <!-- 播放队列面板 -->
  <div id="queue-panel" class="queue-panel hidden">
    <div class="queue-header">
      <h3>播放队列</h3>
      <button id="btn-close-queue" class="btn-icon">✕</button>
    </div>
    <div id="queue-list" class="queue-list">
      <p class="queue-placeholder">队列为空</p>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="js/api.js?v=1.0.2"></script>
  <script src="js/lyrics.js?v=1.0.2"></script>
  <script src="js/player.js?v=1.0.2"></script>
  <script src="js/app.js?v=1.0.2"></script>
</body>
</html>
